<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>first html</title>
  <style>
    body {
      height: 1200px;
      width: 100%;
      background: url('./Item/images/01.jpg') no-repeat center center;
      background-size: cover;
      margin: 0;
      font-family: "Microsoft Yahei", Arial, sans-serif;
      color: white;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: rgba(0,0,0,0.4); /* 半透明遮罩提升文字可读性 */
    }
    p {
      text-align: center;
      margin: 16px 0;
      font-size: 1.2em;
      line-height: 1.6;
    }
    p.title {
      font-size: 2em;
      font-weight: bold;
      margin-top: 40px;
    }
    p.author {
      font-size: 1.1em;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="title">《寒窑赋》</p>
    <p class="author">罗佑</p>
    <p>天有不测风云，人有旦夕祸福；</p>
    <p>蜈蚣百足行不及蛇，雄鸡两翼飞不过鸦；</p>
    <p>马有千里之程，无骑不能自往；</p>
    <p>人有冲天之志，非运不能自通</p>
  </div>
</body>
</html>
